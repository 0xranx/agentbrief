<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--surface:#18181b;--surface2:#27272a;--border:#3f3f46;--border-hover:#52525b;
  --text:#fafafa;--muted:#a1a1aa;--dim:#71717a;
  --accent:#3b82f6;--accent-hover:#60a5fa;
  --green:#22c55e;--purple:#a78bfa;--orange:#f59e0b;
  --mono:'JetBrains Mono',SFMono-Regular,Consolas,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --code-bg:#0d1117;--code-header:#161b22;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--accent)}
a:hover{color:var(--accent-hover)}
::selection{background:var(--accent);color:#fff}

nav{position:sticky;top:0;z-index:50;background:rgba(9,9,11,.8);backdrop-filter:blur(16px);border-bottom:1px solid rgba(63,63,70,.5)}
nav .inner{max-width:1080px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
nav .logo{font-family:var(--mono);font-weight:700;font-size:16px;color:var(--text);letter-spacing:-.5px;text-decoration:none}
nav .logo span{color:var(--accent)}
nav .nav-links{display:flex;gap:20px;align-items:center;font-size:13px;font-weight:500}
nav .nav-links a{color:var(--dim);text-decoration:none;transition:color .15s}
nav .nav-links a:hover{color:var(--text)}
nav .nav-links a.active{color:var(--text)}

.layout{display:flex;max-width:1080px;margin:0 auto;min-height:calc(100vh - 52px)}

/* Sidebar */
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);padding:24px 16px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sidebar h4{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding-left:8px}
.sidebar h4:first-child{margin-top:0}
.sidebar a{display:block;padding:6px 8px;font-size:13px;color:var(--muted);border-radius:6px;text-decoration:none;transition:all .1s;margin-bottom:1px}
.sidebar a:hover{color:var(--text);background:var(--surface)}
.sidebar a.active{color:var(--accent);background:rgba(59,130,246,.1)}

/* Content */
.content{flex:1;padding:32px 40px;max-width:100%;overflow-x:hidden}
.content .loading{color:var(--dim);font-size:14px;padding:40px 0}

/* Markdown rendered content */
.md h1{font-size:28px;font-weight:700;letter-spacing:-.5px;margin:0 0 16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.md h2{font-size:22px;font-weight:700;letter-spacing:-.3px;margin:36px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--surface2)}
.md h3{font-size:17px;font-weight:600;margin:28px 0 8px}
.md h4{font-size:14px;font-weight:600;margin:20px 0 6px}
.md p{margin:0 0 14px;color:var(--muted);font-size:14px;line-height:1.7}
.md strong{color:var(--text);font-weight:600}
.md ul,.md ol{margin:0 0 14px;padding-left:24px;color:var(--muted);font-size:14px}
.md li{margin-bottom:4px;line-height:1.6}
.md code{font-family:var(--mono);font-size:12px;background:var(--surface2);padding:2px 6px;border-radius:4px;color:var(--text)}
.md table{width:100%;border-collapse:collapse;margin:0 0 16px;font-size:13px}
.md th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);font-weight:600;font-size:12px;color:var(--dim)}
.md td{padding:8px 12px;border-bottom:1px solid var(--surface2);color:var(--muted)}
.md blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:0 0 14px;background:var(--surface);border-radius:0 8px 8px 0}
.md blockquote p{color:var(--muted);margin:0}
.md hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.md a{color:var(--accent)}

/* Code blocks — wrapped in .code-block container */
.md pre{background:none;border:none;border-radius:0;padding:0;margin:0 0 16px;overflow:visible}
.md pre code{background:none;padding:0;font-size:13px;line-height:1.65;color:#e6edf3}
.code-block{border-radius:8px;overflow:hidden;border:1px solid #30363d;background:var(--code-bg);margin:0 0 16px}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:36px;background:var(--code-header);border-bottom:1px solid #30363d}
.code-lang{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--dim);text-transform:lowercase;letter-spacing:.3px}
.code-copy{background:none;border:1px solid transparent;border-radius:4px;color:var(--dim);padding:2px 8px;font-size:11px;font-family:var(--sans);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
.code-copy:hover{color:var(--muted);border-color:#30363d;background:rgba(255,255,255,.04)}
.code-copy.copied{color:var(--green);border-color:rgba(34,197,94,.3)}
.code-copy svg{width:14px;height:14px}
.code-block pre{margin:0;border:none;border-radius:0}
.code-block pre code{display:block;padding:14px 16px;overflow-x:auto;font-size:13px;line-height:1.65}

/* Syntax theme overrides — richer colors on dark bg */
.code-block .hljs{background:transparent;color:#e6edf3}
.code-block .hljs-comment,.code-block .hljs-quote{color:#8b949e;font-style:italic}
.code-block .hljs-keyword,.code-block .hljs-selector-tag{color:#ff7b72}
.code-block .hljs-string,.code-block .hljs-attr{color:#a5d6ff}
.code-block .hljs-number,.code-block .hljs-literal{color:#79c0ff}
.code-block .hljs-built_in{color:#ffa657}
.code-block .hljs-symbol,.code-block .hljs-bullet{color:#f2cc60}
.code-block .hljs-variable,.code-block .hljs-template-variable{color:#ffa657}
.code-block .hljs-type,.code-block .hljs-title,.code-block .hljs-section{color:#d2a8ff}
.code-block .hljs-name,.code-block .hljs-tag{color:#7ee787}
.code-block .hljs-meta{color:#8b949e}
.code-block .hljs-addition{color:#aff5b4;background:rgba(46,160,67,.15)}
.code-block .hljs-deletion{color:#ffdcd7;background:rgba(248,81,73,.15)}

/* CLI-specific tokens for bash blocks */
.cli-prompt{color:#8b949e;user-select:none}
.cli-cmd{color:#79c0ff;font-weight:500}
.cli-flag{color:#ffa657}

@media(max-width:768px){
  .sidebar{display:none}
  .content{padding:24px 16px}
}
</style>
</head>
<body>

<nav>
  <div class="inner">
    <a href="./" class="logo">agent<span>brief</span></a>
    <div class="nav-links">
      <a href="./#briefs">Briefs</a>
      <a href="./#ecosystem">Ecosystem</a>
      <a href="./docs.html" class="active">Docs</a>
      <a href="https://github.com/0xranx/agentbrief">GitHub</a>
    </div>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <h4>Getting Started</h4>
    <a href="#" onclick="load('GUIDE')" class="active" id="nav-GUIDE">User Guide</a>
    <a href="#" onclick="load('AUTHORING')" id="nav-AUTHORING">Authoring Guide</a>
    <h4>About</h4>
    <a href="#" onclick="load('VISION')" id="nav-VISION">Vision & Philosophy</a>
    <a href="#" onclick="load('DESIGN')" id="nav-DESIGN">Design Decisions</a>
    <h4>Reference</h4>
    <a href="#" onclick="load('ENGINE-FORMATS')" id="nav-ENGINE-FORMATS">Engine Formats</a>
    <a href="#" onclick="load('SKILL-ECOSYSTEM-RESEARCH')" id="nav-SKILL-ECOSYSTEM-RESEARCH">Skill Ecosystem</a>
    <a href="#" onclick="load('CATALOG')" id="nav-CATALOG">Full Catalog</a>
  </aside>

  <main class="content">
    <div id="md-content" class="md">
      <div class="loading">Loading documentation...</div>
    </div>
  </main>
</div>

<script>
marked.setOptions({ langPrefix: 'language-' });

const LANG_LABELS = {
  bash:'Bash', shell:'Shell', sh:'Shell',
  yaml:'YAML', yml:'YAML',
  typescript:'TypeScript', ts:'TypeScript',
  javascript:'JavaScript', js:'JavaScript',
  json:'JSON', python:'Python', py:'Python',
  sql:'SQL', markdown:'Markdown', md:'Markdown',
  html:'HTML', css:'CSS', text:'Text',
};

const COPY_ICON = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5.5" y="5.5" width="7" height="7" rx="1.5"/><path d="M3.5 10.5V3a1.5 1.5 0 0 1 1.5-1.5H10.5"/></svg>';
const CHECK_ICON = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8.5l3.5 3.5L13 4"/></svg>';

// CLI-aware enhancement for bash blocks
function enhanceBash(html) {
  return html.split('\n').map(line => {
    if (line.startsWith('<span class="hljs-')) return line;
    line = line.replace(/^(\$\s)/, '<span class="cli-prompt">$1</span>');
    line = line.replace(/(\s)(--?\w[\w-]*)/g, '$1<span class="cli-flag">$2</span>');
    line = line.replace(/^(<span class="cli-prompt">[^<]*<\/span>)?(\s*)(npm|npx|pnpm|yarn|git|agentbrief|cd|cp|mkdir|rm|curl|node|docker|gh|brew)\b/,
      (m, prompt, ws, cmd) => (prompt||'') + ws + '<span class="cli-cmd">' + cmd + '</span>');
    return line;
  }).join('\n');
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code');
  navigator.clipboard.writeText(code.textContent).then(() => {
    btn.innerHTML = CHECK_ICON + 'Copied';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = COPY_ICON + 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// Wrap <pre> blocks in styled container with header + copy button
function wrapCodeBlocks(container) {
  container.querySelectorAll('pre').forEach(pre => {
    const code = pre.querySelector('code');
    if (!code) return;

    // Determine language
    const langClass = (code.className.match(/language-(\w+)/) || [])[1] || '';
    const label = LANG_LABELS[langClass] || langClass || '';

    // Build wrapper
    const wrapper = document.createElement('div');
    wrapper.className = 'code-block';
    wrapper.innerHTML =
      '<div class="code-header">' +
        '<span class="code-lang">' + label + '</span>' +
        '<button class="code-copy" onclick="copyCode(this)">' + COPY_ICON + 'Copy</button>' +
      '</div>';
    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(pre);
  });
}

const BASE = 'https://raw.githubusercontent.com/0xranx/agentbrief/main/';
const paths = {
  'GUIDE': 'docs/GUIDE.md',
  'AUTHORING': 'docs/AUTHORING.md',
  'VISION': 'docs/VISION.md',
  'DESIGN': 'docs/DESIGN.md',
  'ENGINE-FORMATS': 'docs/ENGINE-FORMATS.md',
  'SKILL-ECOSYSTEM-RESEARCH': 'docs/SKILL-ECOSYSTEM-RESEARCH.md',
  'CATALOG': 'CATALOG.md',
};

let current = 'GUIDE';

async function load(key) {
  current = key;
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  const navEl = document.getElementById('nav-' + key);
  if (navEl) navEl.classList.add('active');

  const container = document.getElementById('md-content');
  container.innerHTML = '<div class="loading">Loading...</div>';

  try {
    const res = await fetch(BASE + paths[key]);
    if (!res.ok) throw new Error('Failed to fetch');
    const md = await res.text();
    container.innerHTML = marked.parse(md);

    // 1. Syntax highlight
    container.querySelectorAll('pre code').forEach(block => {
      if (!block.className) {
        const result = hljs.highlightAuto(block.textContent);
        block.innerHTML = result.value;
        block.classList.add('hljs', 'language-' + (result.language || 'plaintext'));
      } else {
        hljs.highlightElement(block);
      }
      // CLI enhancement for bash
      if (block.className.match(/language-(bash|shell|sh)/)) {
        block.innerHTML = enhanceBash(block.innerHTML);
      }
    });

    // 2. Wrap code blocks with header + copy button
    wrapCodeBlocks(container);
  } catch (e) {
    container.innerHTML = '<p style="color:var(--dim)">Failed to load document. <a href="https://github.com/0xranx/agentbrief/blob/main/' + paths[key] + '">View on GitHub →</a></p>';
  }

  history.replaceState(null, '', '#' + key);
  window.scrollTo(0, 0);
}

const hash = location.hash.replace('#', '');
if (hash && paths[hash]) {
  load(hash);
} else {
  load('GUIDE');
}
</script>
</body>
</html>
